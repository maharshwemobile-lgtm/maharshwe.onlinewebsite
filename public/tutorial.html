<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tutorial</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

<div class="max-w-3xl mx-auto p-4">

  <div id="tutorialBox"></div>

</div>

<script>

async function loadTutorial(){

  const id = new URLSearchParams(location.search).get("id");

  const res = await fetch("/api/solutions");

  const data = await res.json();

  const item = data.find(x => String(x.id) === String(id));

  if(!item){
    document.getElementById("tutorialBox").innerHTML =
    "<div class='bg-white p-6 rounded-3xl'>Not found</div>";
    return;
  }

  document.title = item.title;

  document.getElementById("tutorialBox").innerHTML = `

  <div class="bg-white rounded-3xl overflow-hidden shadow">

    <img src="${item.image || 'https://placehold.co/1200x700'}"
    class="w-full aspect-video object-cover">

    <div class="p-5">

      <div class="text-sm font-black text-teal-600">
        ${item.category || 'Tutorial'}
      </div>

      <h1 class="mt-2 text-3xl font-black">
        ${item.title}
      </h1>

      <p class="mt-4 text-slate-600 leading-8">
        ${item.description || ''}
      </p>

      <div class="mt-8 space-y-8">

        ${(item.steps || []).map((s,i)=>`

        <div class="rounded-3xl border border-slate-200 overflow-hidden">

          <img src="${s.image || 'https://placehold.co/1200x700'}"
          class="w-full aspect-video object-cover">

          <div class="p-5">

            <div class="text-lg font-black">
              Step ${i+1}
            </div>

            <h2 class="mt-2 text-2xl font-black">
              ${s.title || ''}
            </h2>

            <p class="mt-4 leading-8 text-slate-600">
              ${s.text || ''}
            </p>

          </div>

        </div>

        `).join('')}

      </div>

    </div>

  </div>

  `;

}

loadTutorial();

</script>

</body>
</html>
